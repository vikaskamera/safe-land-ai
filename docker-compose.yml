services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: safe-land-ai-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:///./data/safe_land.db
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
      - backend_models:/app/ml_models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: safe-land-ai-web
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  backend_data:
  backend_logs:
  backend_models:
